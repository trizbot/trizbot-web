<div class="blank-layout-container d-flex justify-content-center align-items-center bg-light min-vh-100">
    <div class="position-relative row w-100 h-100 justify-content-center align-items-center">
      <div class="col-lg-4 col-md-6 col-sm-10">
        <mat-card class="p-4 shadow rounded-4 border border-primary-subtle">
          <mat-card-content>
  
            <!-- Logo -->
            <div class="text-center mb-4">
              <a [routerLink]="['/welcome']">
                <img src="./assets/images/logos/dark-logo.jpg" alt="logo" style="width: 100px;" />
              </a>
            </div>
  
            <!-- Info Text -->
            <div class="text-center mb-4">
              <h5 class="fw-semibold text-dark">Email Confirmation</h5>
              <p class="text-muted small">
                Please enter the 6-digit confirmation code sent to your registered email address to proceed.
                If you haven’t received the email, check your spam folder or request a new code.
              </p>
            </div>
  
            <!-- Form -->
            <form class="mt-3" (submit)="onCompleteEmailVerification()">
              <mat-form-field appearance="outline" class="w-100 mb-3" color="primary">
                <mat-label>Confirmation Code</mat-label>
                <input type="text" matInput placeholder="Enter your code here" name="confirmationCode" [(ngModel)]="emailConfirmationData.otp" />
              </mat-form-field>
  
              <button mat-flat-button color="primary" class="w-100 py-2 fw-bold" type="submit">
                <ng-container *ngIf="loading; else buttonText">
                  <img src="./assets/images/loading.gif" alt="Loading..." style="width: 26px; height: 26px;" />
                </ng-container>
                <ng-template #buttonText>Verify Code</ng-template>
              </button>
            </form>
  
            <!-- Error Message -->
            <div *ngIf="errorMessage" class="alert alert-danger mt-3">
              <b>{{ errorMessage }}</b>
            </div>
  
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>
